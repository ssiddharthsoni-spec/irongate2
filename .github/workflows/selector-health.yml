name: Selector Health Probe

# Runs weekly to detect when AI platforms change their DOM
# If selectors break, the extension is broken in production
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  selector-health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: apps/extension

      - name: Run selector health probe
        # WP4: no longer muted with '|| true' — a dead selector is a
        # production protection gap and must turn this workflow RED so it
        # notifies. The report still uploads via the always() step below.
        run: npx playwright test tests/e2e/selector-health.spec.ts --reporter=list
        working-directory: apps/extension

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selector-health-report
          path: apps/extension/test-results/
          retention-days: 30
