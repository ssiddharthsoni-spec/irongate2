name: Release Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm turbo build --filter=@iron-gate/extension

      - name: Create ZIP archive
        run: |
          cd apps/extension/dist
          zip -r ../../../iron-gate-extension-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            iron-gate-extension-${{ github.ref_name }}.zip \
            --title "Iron Gate Extension ${{ github.ref_name }}" \
            --generate-notes
