name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

  build-packages:
    name: Build Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm turbo build --filter=@iron-gate/types --filter=@iron-gate/config --filter=@iron-gate/crypto --filter=@iron-gate/plugin-sdk

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    needs: [build-packages]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard
        run: pnpm turbo build --filter=@iron-gate/dashboard

  build-extension:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: [build-packages]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm turbo build --filter=@iron-gate/extension

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: apps/extension/dist/
          retention-days: 14

  build-vscode-extension:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    needs: [build-packages]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build VS Code extension
        run: cd apps/vscode-extension && pnpm build

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: [build-packages]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API tests
        run: pnpm turbo test --filter=@iron-gate/api

  test-extension:
    name: Test Extension
    runs-on: ubuntu-latest
    needs: [build-packages]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run extension tests
        run: pnpm turbo test --filter=@iron-gate/extension

  test-detection:
    name: Test Detection (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for test files
        id: check-tests
        run: |
          if find apps/detection -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "No test files found — skipping heavy dependency install"
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.check-tests.outputs.has_tests == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/detection/requirements.txt

      - name: Install Python dependencies
        if: steps.check-tests.outputs.has_tests == 'true'
        run: pip install -r apps/detection/requirements.txt

      - name: Install test dependencies
        if: steps.check-tests.outputs.has_tests == 'true'
        run: pip install pytest

      - name: Run detection tests
        if: steps.check-tests.outputs.has_tests == 'true'
        run: |
          python -m pytest apps/detection/ -v --tb=short --no-header -q; EXIT=$?
          if [ $EXIT -eq 5 ]; then
            echo "No tests collected yet — skipping"
            exit 0
          fi
          exit $EXIT

  # ── Security Scanning ────────────────────────────────────────────────────

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency audit
        run: pnpm audit --audit-level=critical

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ── Deployment ───────────────────────────────────────────────────────────
  # API deploys automatically via Render (connected to GitHub).
  # Dashboard deploys automatically via Vercel (connected to GitHub).
