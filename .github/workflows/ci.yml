name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

  build-packages:
    name: Build Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm turbo build --filter=@iron-gate/types --filter=@iron-gate/config --filter=@iron-gate/crypto --filter=@iron-gate/plugin-sdk

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    needs: [build-packages]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard
        run: pnpm turbo build --filter=@iron-gate/dashboard

  build-extension:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: [build-packages]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm turbo build --filter=@iron-gate/extension

      - name: Upload extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-dist
          path: apps/extension/dist/
          retention-days: 14

  build-vscode-extension:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    needs: [build-packages]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build VS Code extension
        run: cd apps/vscode-extension && pnpm build

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: [build-packages]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API tests
        run: pnpm turbo test --filter=@iron-gate/api

  test-extension:
    name: Test Extension
    runs-on: ubuntu-latest
    needs: [build-packages]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run extension tests
        run: pnpm turbo test --filter=@iron-gate/extension

  test-detection:
    name: Test Detection (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/detection/requirements.txt

      - name: Install Python dependencies
        run: pip install -r apps/detection/requirements.txt

      - name: Install test dependencies
        run: pip install pytest

      - name: Run detection tests
        run: |
          python -m pytest apps/detection/ -v --tb=short --no-header -q; EXIT=$?
          if [ $EXIT -eq 5 ]; then
            echo "No tests collected yet — skipping"
            exit 0
          fi
          exit $EXIT

  # ── Security Scanning ────────────────────────────────────────────────────

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency audit
        run: pnpm audit --audit-level=critical

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ── Deployment ───────────────────────────────────────────────────────────

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [lint, build-packages, test-api, test-extension, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service irongate-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Post-deploy health check
        run: |
          echo "Waiting 30s for deployment to stabilize..."
          sleep 30
          if [ -z "$API_HEALTH_URL" ]; then
            echo "WARNING: API_HEALTH_URL secret not set — skipping health check"
            exit 0
          fi
          API_URL="$API_HEALTH_URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i returned $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
        env:
          API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}
