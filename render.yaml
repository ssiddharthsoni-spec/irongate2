services:
  # ── Production API ────────────────────────────────────────────────────────
  - type: web
    name: irongate-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    repo: https://github.com/ssiddharthsoni-spec/irongate2
    branch: main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: DEFAULT_FIRM_ID
        sync: false
      - key: DASHBOARD_URL
        value: https://irongate-dashboard.vercel.app
      - key: IRON_GATE_ENCRYPTION_SECRET
        generateValue: true
      - key: IRON_GATE_SIGNING_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ADMIN_KEY_1
        sync: false
      - key: ADMIN_KEY_2
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CHROME_EXTENSION_ID
        sync: false

  # ── Staging API ───────────────────────────────────────────────────────────
  - type: web
    name: irongate-api-staging
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    repo: https://github.com/ssiddharthsoni-spec/irongate2
    branch: staging
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: DEFAULT_FIRM_ID
        sync: false
      - key: DASHBOARD_URL
        value: https://irongate-dashboard-staging.vercel.app
      - key: IRON_GATE_ENCRYPTION_SECRET
        generateValue: true
      - key: IRON_GATE_SIGNING_SECRET
        generateValue: true
