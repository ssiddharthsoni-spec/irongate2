<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iron Gate — We're Sorry to See You Go</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .logo { font-size: 32px; margin-bottom: 8px; }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 8px; }
    p { color: #555; line-height: 1.6; margin-bottom: 24px; }
    .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .option {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 10px;
      cursor: pointer; transition: all 0.2s;
    }
    .option:hover { border-color: #667eea; background: #f7f8ff; }
    .option.selected { border-color: #667eea; background: #eef0ff; }
    .option input[type="radio"] { accent-color: #667eea; }
    .option label { cursor: pointer; flex: 1; color: #333; }
    textarea {
      width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px;
      font-family: inherit; font-size: 14px; resize: vertical; min-height: 80px;
      margin-bottom: 16px; display: none;
    }
    textarea:focus { outline: none; border-color: #667eea; }
    textarea.visible { display: block; }
    button {
      width: 100%; padding: 14px; background: #667eea; color: white;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #5a6fd6; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .thanks { text-align: center; display: none; }
    .thanks h2 { color: #667eea; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card" id="survey">
    <div class="logo">🛡️</div>
    <h1>Why are you removing Iron Gate?</h1>
    <p>Your feedback helps us improve. This takes 10 seconds.</p>

    <form id="form">
      <div class="options">
        <div class="option" onclick="selectOption(this, 'false_positives')">
          <input type="radio" name="reason" value="false_positives" id="r1">
          <label for="r1">Too many false positives</label>
        </div>
        <div class="option" onclick="selectOption(this, 'slow')">
          <input type="radio" name="reason" value="slow" id="r2">
          <label for="r2">Slowed down my workflow</label>
        </div>
        <div class="option" onclick="selectOption(this, 'confused')">
          <input type="radio" name="reason" value="confused" id="r3">
          <label for="r3">Didn't understand what it does</label>
        </div>
        <div class="option" onclick="selectOption(this, 'firm_asked')">
          <input type="radio" name="reason" value="firm_asked" id="r4">
          <label for="r4">My firm asked me to remove it</label>
        </div>
        <div class="option" onclick="selectOption(this, 'other')">
          <input type="radio" name="reason" value="other" id="r5">
          <label for="r5">Other</label>
        </div>
      </div>

      <textarea id="details" placeholder="Any additional details? (optional)" class=""></textarea>
      <button type="submit" id="submitBtn" disabled>Submit Feedback</button>
    </form>
  </div>

  <div class="card thanks" id="thanks">
    <div class="logo">🙏</div>
    <h2>Thank you for your feedback!</h2>
    <p>We'll use this to make Iron Gate better. You can always reinstall from the Chrome Web Store.</p>
  </div>

  <script>
    let selectedReason = '';

    function selectOption(el, value) {
      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      el.querySelector('input').checked = true;
      selectedReason = value;
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('details').classList.toggle('visible', value === 'other');
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const details = document.getElementById('details').value;

      try {
        // Send to API (best-effort, extension is already uninstalled)
        await fetch('https://irongate-api.onrender.com/v1/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            entityType: 'UNINSTALL_SURVEY',
            isCorrect: false,
            entityHash: selectedReason,
            correctedType: details || undefined,
          }),
        }).catch(() => {});
      } catch {}

      document.getElementById('survey').style.display = 'none';
      document.getElementById('thanks').style.display = 'block';
    });
  </script>
</body>
</html>
