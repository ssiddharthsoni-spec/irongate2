<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChatGPT (Mock) — IronGate Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #212121; color: #ececec; height: 100vh; display: flex; flex-direction: column; }
  .header { padding: 12px 20px; border-bottom: 1px solid #3a3a3a; display: flex; align-items: center; gap: 10px; }
  .header .logo { font-weight: 600; font-size: 16px; }
  .badge { background: #10a37f; color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .message { max-width: 800px; width: 100%; margin: 0 auto; }
  .message.user { align-self: flex-end; }
  .message.user .bubble { background: #2f2f2f; padding: 12px 16px; border-radius: 18px 18px 4px 18px; }
  .message.assistant .bubble { padding: 12px 0; }
  .assistant-label { font-size: 12px; color: #8e8ea0; margin-bottom: 6px; }
  .input-area { padding: 16px 20px 24px; border-top: 1px solid #3a3a3a; }
  .input-wrapper { max-width: 800px; margin: 0 auto; background: #2f2f2f; border-radius: 16px; display: flex; align-items: flex-end; padding: 8px 8px 8px 16px; gap: 8px; }
  #prompt-textarea { flex: 1; background: transparent; border: none; outline: none; color: #ececec; font-size: 15px; line-height: 1.5; resize: none; min-height: 24px; max-height: 200px; padding: 4px 0; }
  #prompt-textarea::placeholder { color: #666; }
  button[data-testid="send-button"] { background: #10a37f; border: none; border-radius: 10px; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  button[data-testid="send-button"]:disabled { background: #444; cursor: not-allowed; }
  button[data-testid="send-button"] svg { fill: white; }
  .status-bar { text-align: center; font-size: 12px; color: #666; padding: 8px; background: #1a1a2e; }
  .intercepted-info { display: none; background: #1e3a2f; border: 1px solid #10a37f; border-radius: 8px; padding: 10px 14px; margin: 8px 0; font-size: 12px; color: #6fcf97; }
  .intercepted-info.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">ChatGPT</div>
  <div class="badge">MOCK — IronGate Test</div>
</div>

<div class="messages" id="messages">
  <div class="message assistant">
    <div class="assistant-label">ChatGPT</div>
    <div class="bubble" data-message-author-role="assistant">
      Hello! I'm a mock ChatGPT interface for IronGate testing. Type a message with sensitive data to test PII detection and pseudonymization.
    </div>
  </div>
</div>

<div class="input-area">
  <div class="intercepted-info" id="intercepted-info"></div>
  <div class="input-wrapper">
    <textarea
      id="prompt-textarea"
      placeholder="Message ChatGPT..."
      rows="1"
    ></textarea>
    <button data-testid="send-button" id="send-btn" aria-label="Send message">
      <svg width="16" height="16" viewBox="0 0 16 16"><path d="M.5 1.163A1 1 0 0 1 1.97.28l12.868 6.837a1 1 0 0 1 0 1.766L1.969 15.72A1 1 0 0 1 .5 14.836V10.33a1 1 0 0 1 .816-.983L8.5 8 1.316 6.653A1 1 0 0 1 .5 5.67V1.163z"/></svg>
    </button>
  </div>
</div>

<div class="status-bar" id="status">IronGate extension active — prompts will be scanned before sending</div>

<script>
  const textarea = document.getElementById('prompt-textarea');
  const sendBtn = document.getElementById('send-btn');
  const messages = document.getElementById('messages');
  const statusBar = document.getElementById('status');
  const interceptedInfo = document.getElementById('intercepted-info');

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
  });

  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  sendBtn.addEventListener('click', sendMessage);

  // ── Track what was actually sent (for IronGate interception verification) ─
  window.__IRONGATE_LAST_INTERCEPTED = null;
  window.__IRONGATE_ORIGINAL_TEXT = null;

  // ── Override fetch to log what goes to the "API" ─────────────────────────
  // This runs AFTER IronGate's fetch wrapper, so we see the pseudonymized payload
  const _origFetch = window.fetch;
  window.__MOCK_FETCH_CALLS = [];

  // ── Send message ──────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = textarea.value.trim();
    if (!text) return;

    window.__IRONGATE_ORIGINAL_TEXT = text;
    textarea.value = '';
    textarea.style.height = 'auto';

    // FIDELITY: do NOT render the user bubble from the typed original. Real
    // ChatGPT renders it from server state (the wire payload = pseudonyms).
    // Create an empty user bubble now; fill it from the server's user_echo
    // event below (which carries what the server actually received). Iron Gate
    // must then restore the original into it.
    const userBubble = addMessage('user', '');
    statusBar.textContent = 'Scanning for sensitive data...';
    sendBtn.disabled = true;

    try {
      // This fetch call is what IronGate intercepts and pseudonymizes
      const response = await fetch('/backend-api/conversation', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'gpt-4o',
          messages: [
            {
              id: 'msg-' + Date.now(),
              author: { role: 'user' },
              content: { content_type: 'text', parts: [text] },
            }
          ],
          parent_message_id: null,
          conversation_id: 'test-conv-123',
        }),
      });

      // Read SSE stream
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let assistantText = '';
      const assistantEl = addMessage('assistant', '');

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            // Server echo of the received user message (the pseudonyms) →
            // render the user bubble from it, like real ChatGPT renders from
            // server state. Iron Gate's DOM de-pseudo must restore the original.
            if (parsed?.user_echo !== undefined) {
              userBubble.textContent = parsed.user_echo;
              continue;
            }
            const parts = parsed?.message?.content?.parts;
            if (parts?.[0]) {
              assistantText = parts[0];
              assistantEl.textContent = assistantText;
            }
          } catch {}
        }
      }

      statusBar.textContent = 'Response received ✓';

      // Check interception log
      const log = await fetch('/api/intercepted').then(r => r.json());
      const last = log.filter(e => e.platform === 'chatgpt').slice(-1)[0];
      if (last) {
        const sentText = last.payload.body;
        const wasIntercepted = sentText !== text;
        window.__IRONGATE_LAST_INTERCEPTED = sentText;
        if (wasIntercepted) {
          showInterceptedBadge(text, sentText);
          statusBar.textContent = '🛡️ IronGate: PII detected and pseudonymized before sending';
        } else {
          statusBar.textContent = '✓ No sensitive data detected';
        }
      }

    } catch (err) {
      addMessage('assistant', `Error: ${err.message}`);
      statusBar.textContent = 'Error sending message';
    } finally {
      sendBtn.disabled = false;
    }
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      ${role === 'assistant' ? '<div class="assistant-label">ChatGPT</div>' : ''}
      <div class="bubble" data-message-author-role="${role}">${text}</div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div.querySelector('.bubble');
  }

  function showInterceptedBadge(original, pseudonymized) {
    interceptedInfo.className = 'intercepted-info show';
    interceptedInfo.innerHTML = `
      <strong>🛡️ IronGate intercepted this prompt</strong><br>
      <span style="color:#aaa">Original:</span> <code>${original.slice(0, 100)}</code><br>
      <span style="color:#aaa">Sent to AI:</span> <code>${pseudonymized.slice(0, 100)}</code>
    `;
  }
</script>
</body>
</html>
